<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — BookNest</title>
  <meta name="description" content="Thank you for your order at BookNest. Your books are on the way!" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/animations.css" />
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="container section" id="successRoot"></main>
  <div id="footer-placeholder"></div>
  <script src="/js/books.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const order = Store.get('bn_last_order', null);
      const root = document.getElementById('successRoot');
      if (!order) { root.innerHTML = `<div class="empty-state"><div class="ico">📦</div><h2>No recent order found</h2><a class="btn btn-primary" href="/books.html" style="margin-top:16px">Shop Books</a></div>`; return; }
      const delivery = new Date(Date.now() + 1000*60*60*24*5).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
      root.innerHTML = `
        <div class="card pop" style="max-width:640px;margin:0 auto;padding:44px;text-align:center">
          <div style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:2.6rem;display:grid;place-items:center;margin:0 auto 20px;box-shadow:0 12px 30px rgba(34,197,94,.4)">✓</div>
          <h1>Order Confirmed!</h1>
          <p style="color:var(--text-light);margin:10px 0 24px">Thank you, ${order.customer.name.split(' ')[0]}! Your order has been placed successfully. A confirmation was sent to ${order.customer.email}.</p>
          <div class="glass" style="padding:20px;text-align:left;border-radius:16px">
            <div class="row" style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:var(--text-light)">Order Number</span><strong>#${order.id}</strong></div>
            <div class="row" style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:var(--text-light)">Payment</span><strong>${order.payment}</strong></div>
            <div class="row" style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:var(--text-light)">Total Paid</span><strong>${money(order.totals.total)}</strong></div>
            <div class="row" style="display:flex;justify-content:space-between;padding:6px 0"><span style="color:var(--text-light)">Estimated Delivery</span><strong class="text-accent">${delivery}</strong></div>
          </div>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap">
            <a class="btn btn-primary" href="/books.html">Continue Shopping</a>
            <button class="btn btn-ghost" onclick="window.print()">🖨 Print Invoice</button>
            <button class="btn btn-ghost" onclick="downloadReceipt()">⬇ Download Receipt</button>
          </div>
        </div>`;
      window.__order = order;
    });
    function downloadReceipt(){
      const o = window.__order; if(!o) return;
      let txt = `BookNest — Order Receipt\n==========================\nOrder #: ${o.id}\nDate: ${new Date(o.date).toLocaleString()}\nCustomer: ${o.customer.name}\nEmail: ${o.customer.email}\nAddress: ${o.customer.address}, ${o.customer.city} ${o.customer.postal}, ${o.customer.country}\nPayment: ${o.payment}\n\nItems:\n`;
      o.items.forEach(i=> txt += `  - ${i.title} x${i.qty}  ${money(i.price*i.qty)}\n`);
      txt += `\nSubtotal: ${money(o.totals.subtotal)}\nDiscount: -${money(o.totals.discount)}\nShipping: ${o.totals.shipping?money(o.totals.shipping):'FREE'}\nTax: ${money(o.totals.tax)}\nTOTAL: ${money(o.totals.total)}\n\nThank you for shopping with BookNest!`;
      const blob = new Blob([txt], {type:'text/plain'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `BookNest-Receipt-${o.id}.txt`; a.click();
    }
  </script>
</body>
</html>
